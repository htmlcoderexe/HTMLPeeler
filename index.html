<!DOCTYPE html>
<html>
<head>
</head>
<body>
<style type="text/css">
#output
{
    background-color: #B0B1C0;
}
#output p
{
    border: 1px solid #CEECEF;
    margin-bottom: 1em;
    padding: 0.5em;
    background-color: #FEEFFF;
}
#output blockquote, #output ul, #output ol, #output dl
{
    margin-left: 2em;
    border: 1px solid #CEECEF;
    margin-bottom: 1em;
    padding: 0.5em;
    background-color: #FEEFFF;
}
#output p::before, #output blockquote::before, #output img::before, #output ul::before, #output ol::before, #output dl::before
{
    content:attr(data-num);
    ---------border: 1px solid red;
    position:relative;
    left:-1em;
    top:-1em;
    font-size:0.4rem;
}
#output h1::before, #output h2::before, #output h3::before, #output h4::before, #output h5::before, #output h6::before, #output h7::before
{
    content:attr(data-num);
    -------border: 1px solid red;
    position:relative;
    left:0;
    top:0;
    font-size:0.4rem;
}
#output img
{
    max-width: 100%;
}
#output
{
    margin-left:auto;
    margin-right:auto;
    width: 80%;
    z-index:99999;
    position: relative;
    font-family: Verdana, Geneva, Tahoma, sans-serif;
    font-size: 1.0rem;
    line-height: 1.5rem;
}
#target, #depthinfo,#toc,#targetcontainer
{
    width: 300px;
    height:280px;
    border: 1px solid black;
    overflow: scroll;
    display:inline-block;
}
</style>
<script src="peeler.js"></script>
<div id="targetcontainer"><iframe sandbox="allow-same-origin" id="target" srcdoc="<!doctype html><head></head><body contenteditable>a</body></html>"></iframe><iframe id="target2"></iframe></div><ul id="depthinfo"></ul><ol id="toc"></ol><br />
<input type="checkbox" id="autodetect" /><input type="range" min="0" max="10" id="scraperdepth" /><span>Skip first </span><input type="number" id="skipfirst" value="0" /><span> and last </span><input value="0" type="number" id="skiplast" /><span> blocks.</span>
<br /><button id="scrape">go</button>
<div id="output"></div>
<script>
let output=document.getElementById("output");
let depthslider = document.getElementById("scraperdepth");
let depthinfo = document.getElementById("depthinfo");
let gobutton=document.getElementById("scrape");
let toc = document.getElementById("toc");
let skiplast = document.getElementById("skiplast");
let skipfirst = document.getElementById("skipfirst");
let ad = document.getElementById("autodetect");
let inputframe=document.getElementById("target");

ad.addEventListener("change",(e)=>{
    depthslider.disabled=ad.checked;
});

gobutton.addEventListener("click",(e)=>{
    output.innerHTML="";
    toc.innerHTML="";

    let scraper = new HTMLPeeler(inputframe.contentDocument.body);
    scraper.depth=ad.checked?-1:depthslider.value;

    let doc = scraper.scrape();
    doc.trim(skipfirst.value,skiplast.value);
    
    let formatter = new HTMLFormatter(doc);
    formatter.outputHTMLDoc(output);
    formatter.outputTOC(toc);

    console.log(doc.images);
    console.log(doc.headers);
    console.log(formatter.outline);
    console.log(doc);
});

depthslider.addEventListener("input",(e)=>{
    depthinfo.innerHTML="";
    let scraper=new HTMLPeeler(inputframe.contentDocument.body);
    scraper.depth=depthslider.value;
    let tags = scraper.tagList;
    Object.entries(tags).forEach((tag)=>{
        let li = output.ownerDocument.createElement("li");
        let t="<"+tag[0]+"> x"+tag[1];
        li.appendChild(output.ownerDocument.createTextNode(t));
        depthinfo.appendChild(li);
    });
});

inputframe.addEventListener("load",(e)=> 
{

    inputframe.contentDocument.body.addEventListener("paste",(e)=>{
        let d = e.clipboardData.getData('text/html');
        console.log(d);
        // this is probably not a good idea - check for proper way
        inputframe.contentDocument.body.innerHTML = d;
        e.preventDefault();
    });
});

//inputframe.addEventListener("blur",(e)=>{
//depthslider.dispatchEvent(new Event("input"));});

ad.dispatchEvent(new Event("change"));

</script>
</body>
</html>
